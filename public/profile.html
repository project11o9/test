<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fidelity | Profile</title>

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f4f6f5;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:400px;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#16a34a,#065f46);
color:#fff;
padding:30px 20px;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
text-align:center;
}
.avatar{
width:82px;height:82px;border-radius:50%;
background:#fff;color:#16a34a;
display:flex;align-items:center;justify-content:center;
font-size:34px;font-weight:800;margin:auto;
}
.name{margin-top:12px;font-size:20px;font-weight:700;}
.email{font-size:13px;opacity:.9;}
.verified{
margin-top:8px;
font-size:12px;
background:rgba(255,255,255,.2);
padding:6px 14px;
border-radius:20px;
display:inline-block;
}

/* WALLET */
.wallet-card{
background:#fff;
margin:-35px 20px 20px;
border-radius:22px;
padding:22px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.wallet-balance{
font-size:30px;
font-weight:800;
color:#16a34a;
}

/* CARD */
.card{
background:#fff;
margin:15px 20px;
border-radius:18px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:14px;
}

/* ===== ICON SLIDER ===== */
.app-info-wrapper{
margin:10px 0 20px;
padding-left:20px;
overflow:hidden;
}

.app-info-track{
display:flex;
gap:14px;
overflow-x:auto;
scroll-snap-type:x mandatory;
}
.app-info-track::-webkit-scrollbar{display:none;}

.app-info-card{
flex:0 0 calc((100% - 56px)/3);
background:#fff;
border-radius:18px;
padding:18px 10px;
text-align:center;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.25s;
}

.app-info-card:active{
transform:scale(.92);
}

.app-info-icon{
width:32px;
height:32px;
font-size:28px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
}

.app-info-card span{
display:block;
font-size:12px;
margin-top:8px;
font-weight:600;
}

/* SHEET */
.app-sheet{
position:fixed;
left:0;right:0;bottom:-100%;
background:#fff;
border-radius:24px 24px 0 0;
padding:22px;
transition:.35s;
z-index:9999;
max-width:400px;margin:auto;
box-shadow:0 -15px 40px rgba(0,0,0,.25);
}
.app-sheet.show{bottom:0;}

.input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #e5e7eb;
}

.save-btn{
margin-top:12px;
width:100%;
padding:12px;
border:none;
background:#16a34a;
color:#fff;
border-radius:12px;
font-weight:700;
}

.sheet-close{
margin-top:12px;
width:100%;
padding:12px;
border:none;
background:#111827;
color:#fff;
border-radius:12px;
}

/* NAV */
.bottom-nav{
margin-top:auto;
height:70px;
background:#fff;
border-top:1px solid #eee;
display:flex;
}
.nav-item{
flex:1;text-align:center;padding-top:10px;
text-decoration:none;color:#6b7280;
}
.nav-item.active{color:#16a34a;font-weight:700;}

</style>
</head>

<body>

<div class="container">
    <div class="header">
        <div id="avatar" class="avatar">U</div>
        <div id="username" class="name">Loading...</div>
        <div id="useremail" class="email">...</div>
        <div class="verified">✔ KYC Verified</div>
    </div>

    <div class="wallet-card">
        <div>Available Balance</div>
        <div id="wallet" class="wallet-balance">₹0.00</div>
    </div>

    <div class="card">
        <div class="section-title">Account Information</div>
        <div class="row"><span>Full Name</span><span id="fullName">...</span></div>
        <div class="row"><span>Phone</span><span id="phone">...</span></div>
        <div class="row"><span>Email</span><span id="gmail">...</span></div>
    </div>

    <!-- ICONS -->
    <div class="app-info-wrapper">
        <div class="app-info-track">
            <div class="app-info-card" data-type="bank"><div class="app-info-icon">🏦</div><span>Bank</span></div>
            <div class="app-info-card" data-type="upi"><div class="app-info-icon">📱</div><span>UPI</span></div>
            <div class="app-info-card" data-type="help"><div class="app-info-icon">❓</div><span>Help</span></div>
            <div class="app-info-card" data-type="about"><div class="app-info-icon">ℹ️</div><span>About</span></div>
            <div class="app-info-card" data-type="logout" onclick="logout()"><div class="app-info-icon">🚪</div><span>Logout</span></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="wallet.html" class="nav-item">💰 Wallet</a>
        <a href="profile.html" class="nav-item active">👤 Profile</a>
    </nav>
</div>

<div id="sheet" class="app-sheet">
    <h3 id="sheetTitle"></h3>
    <div id="sheetContent"></div>
    <button class="sheet-close" onclick="document.getElementById('sheet').classList.remove('show')">Close</button>
</div>

<script src="js/auth.js"></script>
<script>
const token = localStorage.getItem('token');

function formatINR(v){
    return "₹" + Number(v).toLocaleString("en-IN", { minimumFractionDigits: 2 });
}

async function loadProfile() {
    try {
        const res = await fetch('/api/user/profile', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
            const user = await res.json();
            document.getElementById("username").textContent = user.name;
            document.getElementById("useremail").textContent = user.email;
            document.getElementById("avatar").textContent = user.name.charAt(0).toUpperCase();
            document.getElementById("wallet").textContent = formatINR(user.wallet_balance || 0);
            document.getElementById("fullName").textContent = user.name;
            document.getElementById("gmail").textContent = user.email;
            document.getElementById("phone").textContent = user.phone || "Not Added";

            if (user.role === 'admin') {
                const track = document.querySelector(".app-info-track");
                const adminCard = document.createElement("div");
                adminCard.className = "app-info-card";
                adminCard.innerHTML = '<div class="app-info-icon">🛠️</div><span>Admin</span>';
                adminCard.onclick = () => window.location.href = "/admin";
                track.prepend(adminCard);
            }
        } else if (res.status === 401 || res.status === 403) {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
    } catch (err) {
        console.error(err);
    }
}

loadProfile();

/* ICON ACTIONS */
document.querySelectorAll(".app-info-card").forEach(card => {
    card.addEventListener("click", () => {
        const type = card.dataset.type;
        const sheet = document.getElementById("sheet");
        const sheetTitle = document.getElementById("sheetTitle");
        const sheetContent = document.getElementById("sheetContent");

        if (type === "bank") {
            sheetTitle.innerText = "Bank Details";
            sheetContent.innerHTML = `
                <p>Contact support to update bank details.</p>
                <p>Email: support@fedility.com</p>
            `;
            sheet.classList.add("show");
        } else if (type === "upi") {
            sheetTitle.innerText = "UPI Details";
            sheetContent.innerHTML = `
                <p>Contact support to update UPI ID.</p>
            `;
            sheet.classList.add("show");
        } else if (type === "help") {
            sheetTitle.innerText = "Help & Support";
            sheetContent.innerHTML = `
                <p>Support Hours: 10 AM – 7 PM</p>
                <p>Email: support@fedility.com</p>
            `;
            sheet.classList.add("show");
        }
    });
});
</script>
</body>
</html>
